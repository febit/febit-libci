stages:
  - test

.base-image:
  image: eclipse-temurin:21-jre
  before_script:
    - echo base-image-before
  artifacts:
    when: always
    paths:
      - reports/base-image.txt

.base-runtime:
  extends: .base-image
  variables:
    FROM_RUNTIME: runtime
  cache:
    key: shared-cache
    paths:
      - .gradle/

.composed-template:
  extends: .base-runtime
  interruptible: true

test-extends-chain:
  extends: .composed-template
  stage: test
  script:
    - echo test-extends-chain

