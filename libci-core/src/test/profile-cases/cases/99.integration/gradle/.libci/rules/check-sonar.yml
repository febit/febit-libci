.with-rules: &with-rules
  rules:
    # Merge Request to main branch
    - if: >-
        $CI_MERGE_REQUEST_IID
        && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    # Push to protected branches
    - if: >-
        $CI_COMMIT_REF_PROTECTED == "true"
    # Add a release tag
    - if: >-
        $CI_COMMIT_TAG =~ /^v[0-9.]+/

check-sonar:
  <<: *with-rules
  stage: build
  extends: .gradle-env
  variables:
  cache:
    key: "sonar"
    paths:
      - .sonar/cache
  script:
    - set -e
    - |-
      ## For Merge Request: Fetch target branch
      if [ -n "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" ]; then
        git fetch -f origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME:$CI_MERGE_REQUEST_TARGET_BRANCH_NAME
      fi
    - libci sonar init
    - ./gradlew check sonar
