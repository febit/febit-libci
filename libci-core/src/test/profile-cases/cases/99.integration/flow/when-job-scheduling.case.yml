stages:
  - success-path
  - failure-trigger
  - failure-follow-up
  - verify

.when-reporting-job:
  artifacts:
    when: always
    paths:
      - reports/
  before_script:
    - |
      mkdir -p reports

      mark() {
        printf '%s\n' "$1" >> "reports/${CI_JOB_NAME}.log"
      }

      fail_if_reached() {
        echo "[ERROR] unexpected execution for $CI_JOB_NAME"
        mark 'unexpected-execution'
        exit 1
      }

success-anchor:
  extends: .when-reporting-job
  stage: success-path
  when: on_success
  script: |
    mark 'success-anchor:ran'

run-on-success-before-failure:
  extends: .when-reporting-job
  stage: success-path
  when: on_success
  script: |
    mark 'run-on-success-before-failure:ran'

skip-on-failure-before-failure:
  extends: .when-reporting-job
  stage: success-path
  when: on_failure
  script: |
    fail_if_reached

run-always-before-failure:
  extends: .when-reporting-job
  stage: success-path
  when: always
  script: |
    mark 'run-always-before-failure:ran'

trigger-pipeline-failure:
  extends: .when-reporting-job
  stage: failure-trigger
  script: |
    mark 'trigger-pipeline-failure:about-to-fail'
    exit 17

skip-on-success-after-failure:
  extends: .when-reporting-job
  stage: failure-follow-up
  when: on_success
  script: |
    fail_if_reached

run-on-failure-after-failure:
  extends: .when-reporting-job
  stage: failure-follow-up
  when: on_failure
  script: |
    mark 'run-on-failure-after-failure:ran'

run-always-after-failure:
  extends: .when-reporting-job
  stage: failure-follow-up
  when: always
  script: |
    mark 'run-always-after-failure:ran'

verify-when-job-scheduling:
  stage: verify
  when: always
  script: |
    assert_exists() {
      local file="$1"
      test -f "$file" || {
        echo "[ERROR] missing expected marker: $file"
        exit 1
      }
    }

    assert_absent() {
      local file="$1"
      if [ -e "$file" ]; then
        echo "[ERROR] unexpected marker present: $file"
        exit 1
      fi
    }

    assert_contains() {
      local file="$1"
      local expected="$2"
      grep -F "$expected" "$file" >/dev/null || {
        echo "[ERROR] expected '$expected' in $file"
        exit 1
      }
    }

    assert_exists reports/success-anchor.log
    assert_exists reports/run-on-success-before-failure.log
    assert_exists reports/run-always-before-failure.log
    assert_exists reports/trigger-pipeline-failure.log
    assert_exists reports/run-on-failure-after-failure.log
    assert_exists reports/run-always-after-failure.log

    assert_absent reports/skip-on-failure-before-failure.log
    assert_absent reports/skip-on-success-after-failure.log

    assert_contains reports/success-anchor.log 'success-anchor:ran'
    assert_contains reports/run-on-success-before-failure.log 'run-on-success-before-failure:ran'
    assert_contains reports/run-always-before-failure.log 'run-always-before-failure:ran'
    assert_contains reports/trigger-pipeline-failure.log 'trigger-pipeline-failure:about-to-fail'
    assert_contains reports/run-on-failure-after-failure.log 'run-on-failure-after-failure:ran'
    assert_contains reports/run-always-after-failure.log 'run-always-after-failure:ran'

