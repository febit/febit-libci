stages:
  - delayed
  - verify

.delayed-artifacts:
  artifacts:
    when: always
    paths:
      - reports/
  before_script:
    - mkdir -p reports

delayed-self-check:
  extends: .delayed-artifacts
  stage: delayed
  image: debian:13-slim
  when: delayed
  start_in: 6 seconds
  script: |
    stage_ms="$(date -u -d "$LIBCI_STAGE_STARTED_AT" +%s%3N)"
    job_ms="$(date -u -d "$CI_JOB_STARTED_AT" +%s%3N)"
    delay_ms="$((job_ms - stage_ms))"

    {
      printf 'stage_started_at=%s\n' "$LIBCI_STAGE_STARTED_AT"
      printf 'job_started_at=%s\n' "$CI_JOB_STARTED_AT"
      printf 'delay_ms=%s\n' "$delay_ms"
    } > reports/delayed-self-check.log

    if [ "$delay_ms" -lt 5800 ]; then
      echo "[ERROR] delayed job started too early: ${delay_ms}ms"
      exit 1
    fi

verify-delayed-self-check:
  stage: verify
  when: always
  dependencies:
    - delayed-self-check
  script: |
    test -f reports/delayed-self-check.log || {
      echo '[ERROR] missing delayed report'
      exit 1
    }

    grep -E '^stage_started_at=.*Z$' reports/delayed-self-check.log >/dev/null || {
      echo '[ERROR] missing stage_started_at instant'
      exit 1
    }

    grep -E '^job_started_at=.*Z$' reports/delayed-self-check.log >/dev/null || {
      echo '[ERROR] missing job_started_at instant'
      exit 1
    }

    delay_ms="$(sed -n 's/^delay_ms=//p' reports/delayed-self-check.log)"
    test -n "$delay_ms" || {
      echo '[ERROR] missing delay_ms value'
      exit 1
    }

    if [ "$delay_ms" -lt 5800 ]; then
      echo "[ERROR] delayed verification failed: ${delay_ms}ms"
      exit 1
    fi

