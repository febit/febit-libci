stages:
  - build
  - verify

.matrix-base:
  stage: build
  before_script:
    - mkdir -p reports
  artifacts:
    when: always
    paths:
      - reports/

build-plain:
  extends: .matrix-base
  script:
    - echo "plain:$LIBCI_JOB_MATRIX_IID" > reports/plain.txt

build-matrix:
  extends: .matrix-base
  stage: build
  parallel:
    matrix:
      - OS:
          - linux
          - macos
        ARCH:
          - amd64
          - arm64
      - OS:
          - windows
        ARCH:
          - amd64
  script:
    - echo "$OS-$ARCH-$LIBCI_JOB_MATRIX_IID" > "reports/$OS-$ARCH.txt"

verify-matrix:
  stage: verify
  when: always
  script: |
    assert_exists() {
      file="$1"
      test -f "$file" || {
        echo "[ERROR] missing expected file: $file"
        exit 1
      }
    }

    assert_exists reports/plain.txt
    assert_exists reports/linux-amd64.txt
    assert_exists reports/linux-arm64.txt
    assert_exists reports/macos-amd64.txt
    assert_exists reports/macos-arm64.txt
    assert_exists reports/windows-amd64.txt

